name: Deploy Sonora to GitHub Pages

# mainブランチの outputs/ だけをWebサイトとして公開します。
# 詳しい流れは docs/DEPLOYMENT.md を参照してください。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
